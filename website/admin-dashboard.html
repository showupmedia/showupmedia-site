<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Up Media - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: #1f2937;
            color: white;
            padding: 20px;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .nav-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item:hover {
            background: #374151;
            transform: translateX(5px);
        }
        
        .nav-item.active {
            background: #2563eb;
            transform: translateX(5px);
        }
        
        .nav-icon {
            font-size: 18px;
        }
        
        .main-content {
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .header h1 {
            font-size: 28px;
            color: #1f2937;
            margin: 0;
        }
        
        .subscription-badge {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #3b82f6;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-change {
            font-size: 14px;
            color: #10b981;
            font-weight: bold;
        }
        
        .recent-bookings {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .booking-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            font-weight: bold;
        }
        
        .booking-item {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .booking-item:last-child {
            border-bottom: none;
        }
        
        .booking-info {
            flex: 1;
        }
        
        .booking-customer {
            font-weight: 500;
        }
        
        .booking-service {
            color: #666;
            font-size: 14px;
        }
        
        .booking-time {
            color: #666;
            font-size: 14px;
        }
        
        .booking-price {
            font-weight: bold;
            color: #10b981;
        }
        
        .booking-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-confirmed {
            background: #dcfce7;
            color: #065f46;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-cancelled {
            background: #fee2e2;
            color: white;
        }
        
        .realtime-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        .realtime-indicator.active {
            background: #10b981;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #fee2e2;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px;
        }
        
        .upgrade-prompt {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        .upgrade-button {
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .upgrade-button:hover {
            background: #1f2937;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo">🎉 Show Up Media</div>
            
            <div class="nav-item active" onclick="navigateTo('dashboard')">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
                <span class="realtime-indicator active" id="realtimeStatus"></span>
            </div>
            
            <div class="nav-item" onclick="navigateTo('bookings')">
                <span class="nav-icon">📅</span>
                <span>Bookings</span>
            </div>
            
            <div class="nav-item" onclick="navigateTo('services')">
                <span class="nav-icon">💼</span>
                <span>Services</span>
            </div>
            
            <div class="nav-item" onclick="navigateTo('staff')">
                <span class="nav-icon">👥</span>
                <span>Staff</span>
            </div>
            
            <div class="nav-item" onclick="navigateTo('analytics')">
                <span class="nav-icon">📈</span>
                <span>Analytics</span>
            </div>
            
            <div class="nav-item" onclick="navigateTo('settings')">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </div>
        </div>
        
        <div class="main-content">
            <div id="content">
                <div class="loading">Loading dashboard...</div>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        
        // Initialize Supabase client
        const supabase = createClient(
            'https://bqwjyaqkgyoxbzwzszuv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxdWQiOiJicnFsdGUiLCJyb2xlIjoiYW5vbiIsInJhdXRoOiJicnFsdGUiLCJpYXQiOjE3NzQyMTcyMiIsImV4cCI6MjA4OTc3ODE3Mn0.z6GooHoFEDx6ccfY_TcTd5kEamfUgVh4kWiNU-1NkZ8'
        );
        
        let currentView = 'dashboard';
        let businessData = null;
        let realtime = null;
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeDashboard();
        });
        
        async function initializeDashboard() {
            try {
                // Get business data from URL or localStorage
                const urlParams = new URLSearchParams(window.location.search);
                const businessId = urlParams.get('business') || localStorage.getItem('business_id');
                
                if (!businessId) {
                    showError('No business specified. Please access dashboard through your business portal.');
                    return;
                }
                
                // Get business information
                const { data: business, error } = await supabase
                    .from('businesses')
                    .select('*')
                    .eq('id', businessId)
                    .single();
                
                if (error || !business) {
                    showError('Business not found or access denied.');
                    return;
                }
                
                businessData = business;
                localStorage.setItem('business_id', businessId);
                
                // Check subscription plan for features
                const plan = business.plan || 'basic';
                
                // Show upgrade prompt for basic users
                if (plan === 'basic') {
                    showUpgradePrompt();
                } else {
                    // Initialize realtime for Pro/Premium
                    await initializeRealtime(businessId);
                    loadDashboard(businessId);
                }
                
            } catch (error) {
                console.error('Dashboard initialization error:', error);
                showError('Failed to load dashboard. Please try again.');
            }
        }
        
        async function initializeRealtime(businessId) {
            try {
                // Initialize realtime client
                if (window.ShowUpMediaRealtime) {
                    realtime = window.ShowUpMediaRealtime.create(businessId, 'admin_user');
                    
                    // Set up event listeners
                    realtime.on('booking_created', (data) => {
                        showNotification('New booking created!', 'success');
                        if (currentView === 'bookings') loadBookings(businessId);
                    });
                    
                    realtime.on('booking_updated', (data) => {
                        showNotification('Booking updated', 'info');
                        if (currentView === 'bookings') loadBookings(businessId);
                    });
                    
                    realtime.on('booking_cancelled', (data) => {
                        showNotification('Booking cancelled', 'warning');
                        if (currentView === 'bookings') loadBookings(businessId);
                    });
                    
                    realtime.on('availability_updated', (data) => {
                        showNotification('Availability updated', 'info');
                    });
                    
                    realtime.on('staff_updated', (data) => {
                        showNotification('Staff updated', 'info');
                        if (currentView === 'staff') loadStaff(businessId);
                    });
                    
                    realtime.on('service_updated', (data) => {
                        showNotification('Service updated', 'info');
                        if (currentView === 'services') loadServices(businessId);
                    });
                    
                    // Update realtime status indicator
                    updateRealtimeStatus(true);
                }
            } catch (error) {
                console.error('Realtime initialization error:', error);
            }
        }
        
        function updateRealtimeStatus(connected) {
            const indicator = document.getElementById('realtimeStatus');
            if (indicator) {
                indicator.className = connected ? 'realtime-indicator active' : 'realtime-indicator';
            }
        }
        
        function navigateTo(view) {
            // Update navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-item').classList.add('active');
            
            currentView = view;
            
            // Load appropriate content
            if (businessData) {
                switch (view) {
                    case 'dashboard':
                        loadDashboard(businessData.id);
                        break;
                    case 'bookings':
                        loadBookings(businessData.id);
                        break;
                    case 'services':
                        loadServices(businessData.id);
                        break;
                    case 'staff':
                        loadStaff(businessData.id);
                        break;
                    case 'analytics':
                        loadAnalytics(businessData.id);
                        break;
                    case 'settings':
                        loadSettings(businessData.id);
                        break;
                }
            }
        }
        
        async function loadDashboard(businessId) {
            try {
                const content = document.getElementById('content');
                
                // Get recent bookings
                const { data: bookings, error: bookingsError } = await supabase
                    .from('bookings')
                    .select(`
                        *,
                        services!inner(name, price),
                        staff!inner(name)
                    `)
                    .eq('business_id', businessId)
                    .order('created_at', { ascending: false })
                    .limit(10);
                
                // Get today's stats
                const today = new Date().toISOString().split('T')[0];
                const { data: todayStats, error: statsError } = await supabase
                    .from('bookings')
                    .select('count')
                    .eq('business_id', businessId)
                    .eq('booking_date', today);
                    .single();
                
                // Get total revenue
                const { data: revenueData, error: revenueError } = await supabase
                    .from('bookings')
                    .select('total_paid')
                    .eq('business_id', businessId)
                    .gte('booking_date', new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]);
                    .single();
                
                const totalRevenue = revenueData ? 
                    Object.values(revenueData).reduce((sum, val) => sum + (val.total_paid || 0), 0) : 0;
                
                content.innerHTML = `
                    <div class="header">
                        <h1>Dashboard</h1>
                        <div class="subscription-badge">${businessData.plan.toUpperCase()}</div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${todayStats?.count || 0}</div>
                            <div class="stat-label">Today's Bookings</div>
                            <div class="stat-change">+12% from yesterday</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-value">£${totalRevenue.toFixed(2)}</div>
                            <div class="stat-label">This Month's Revenue</div>
                            <div class="stat-change">+8% from last month</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-value">${businessData.name || 'Your Business'}</div>
                            <div class="stat-label">Active Services</div>
                            <div class="stat-change">3 services listed</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-value">${businessData.plan || 'Basic'}</div>
                            <div class="stat-label">Current Plan</div>
                            <div class="stat-change">
                                ${businessData.plan === 'premium' ? 'All features active' : 
                                 businessData.plan === 'pro' ? 'Advanced features' : 
                                 'Upgrade for more features'}
                            </div>
                        </div>
                    </div>
                    
                    <!-- EARNINGS DASHBOARD -->
                    <div class="earnings-section">
                        <div class="header">
                            <h2>?? My Earnings</h2>
                            <div class="header-actions">
                                <select id="earnings-period" onchange="loadEarnings()" style="padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px;">
                                    <option value="month">This Month</option>
                                    <option value="week">This Week</option>
                                    <option value="year">This Year</option>
                                </select>
                                <button onclick="loadEarnings()" style="background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer;">?? Refresh</button>
                            </div>
                        </div>
                        
                        <div class="earnings-stats">
                            <div class="earnings-card">
                                <div class="earnings-value" id="earnings-total-revenue">£0.00</div>
                                <div class="earnings-label">Total Revenue</div>
                                <div class="earnings-subtitle">Gross customer payments</div>
                            </div>
                            
                            <div class="earnings-card">
                                <div class="earnings-value" id="earnings-net-earnings" style="color: #10b981;">£0.00</div>
                                <div class="earnings-label">Net Earnings</div>
                                <div class="earnings-subtitle">After all fees</div>
                            </div>
                            
                            <div class="earnings-card">
                                <div class="earnings-value" id="earnings-pending-payout" style="color: #f59e0b;">£0.00</div>
                                <div class="earnings-label">Pending Payout</div>
                                <div class="earnings-subtitle">Ready to process</div>
                            </div>
                            
                            <div class="earnings-card">
                                <div class="earnings-value" id="earnings-total-bookings">0</div>
                                <div class="earnings-label">Total Bookings</div>
                                <div class="earnings-subtitle">Completed bookings</div>
                            </div>
                        </div>
                        
                        <div class="fee-breakdown">
                            <div class="fee-header">
                                <h3>Transparent Fee Structure</h3>
                                <p>Complete breakdown of all fees for every transaction</p>
                            </div>
                            
                            <div class="fee-details">
                                <div class="fee-item">
                                    <div class="fee-name">Platform Fee</div>
                                    <div class="fee-amount">£0.50 per booking</div>
                                </div>
                                <div class="fee-item">
                                    <div class="fee-name">Stripe Processing Fee</div>
                                    <div class="fee-amount">1.5% + £0.20 per transaction</div>
                                </div>
                                <div class="fee-item total">
                                    <div class="fee-name">Total Fees</div>
                                    <div class="fee-amount" id="total-fees-display">£0.00</div>
                                </div>
                                <div class="fee-item net">
                                    <div class="fee-name">Your Net Earnings</div>
                                    <div class="fee-amount" id="net-earnings-display" style="color: #10b981;">£0.00</div>
                                </div>
                            </div>
                            
                            <div class="example-box">
                                <strong>Example:</strong> £30 service = £28.85 earnings (after £1.15 total fees)
                            </div>
                        </div>
                        
                        <div class="transactions-section">
                            <h3>Recent Transactions</h3>
                            <div id="transactions-list">
                                <div class="loading">Loading transactions...</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Load earnings data after dashboard loads
                loadEarnings();
                
            } catch (error) {
                console.error('Dashboard load error:', error);
                showError('Failed to load dashboard data.');
            }
        }
        
        async function loadBookings(businessId) {
            try {
                const content = document.getElementById('content');
                
                const { data: bookings, error } = await supabase
                    .from('bookings')
                    .select(`
                        *,
                        services!inner(name, price),
                        staff!inner(name)
                    `)
                    .eq('business_id', businessId)
                    .order('created_at', { ascending: false })
                    .limit(50);
                
                if (error) {
                    showError('Failed to load bookings.');
                    return;
                }
                
                let html = `
                    <div class="header">
                        <h1>Bookings</h1>
                    </div>
                    
                    <div class="recent-bookings">
                        <div class="booking-header">
                            <div>Recent Bookings</div>
                            <div>Total: ${bookings.length}</div>
                        </div>
                `;
                
                bookings.forEach(booking => {
                    const statusClass = booking.status === 'confirmed' ? 'status-confirmed' :
                                         booking.status === 'pending' ? 'status-pending' :
                                         'status-cancelled';
                    
                    const statusText = booking.status === 'confirmed' ? 'Confirmed' :
                                         booking.status === 'pending' ? 'Pending' :
                                         'Cancelled';
                    
                    html += `
                        <div class="booking-item">
                            <div class="booking-info">
                                <div class="booking-customer">${booking.customer_name || 'Walk-in'}</div>
                                <div class="booking-service">${booking.services?.name || 'Service'}</div>
                                <div class="booking-time">${new Date(booking.booking_date + 'T' + booking.booking_time).toLocaleString()}</div>
                                <div class="booking-price">£${booking.services?.price || '0'}</div>
                            </div>
                            <div class="booking-status ${statusClass}">${statusText}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Bookings load error:', error);
                showError('Failed to load bookings.');
            }
        }
        
        async function loadServices(businessId) {
            try {
                const content = document.getElementById('content');
                
                const { data: services, error } = await supabase
                    .from('services')
                    .select('*')
                    .eq('business_id', businessId)
                    .order('created_at', { ascending: false });
                
                if (error) {
                    showError('Failed to load services.');
                    return;
                }
                
                let html = `
                    <div class="header">
                        <h1>Services</h1>
                        <button class="upgrade-button" onclick="addService()">+ Add Service</button>
                    </div>
                    
                    <div class="recent-bookings">
                `;
                
                services.forEach(service => {
                    html += `
                        <div class="booking-item">
                            <div class="booking-info">
                                <div class="booking-customer">${service.name}</div>
                                <div class="booking-service">${service.description || 'No description'}</div>
                                <div class="booking-time">£${service.price}</div>
                                <div class="booking-price">Duration: ${service.duration_minutes || 60} min</div>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Services load error:', error);
                showError('Failed to load services.');
            }
        }
        
        async function loadStaff(businessId) {
            try {
                const content = document.getElementById('content');
                
                const { data: staff, error } = await supabase
                    .from('staff')
                    .select(`
                        *,
                        availability!inner(
                          day_of_week,
                          start_time,
                          end_time,
                          is_available
                        )
                    `)
                    .eq('business_id', businessId)
                    .order('created_at', { ascending: false });
                
                if (error) {
                    showError('Failed to load staff.');
                    return;
                }
                
                let html = `
                    <div class="header">
                        <h1>Staff Management</h1>
                        <button class="upgrade-button" onclick="addStaffMember()">+ Add Staff Member</button>
                        <button class="upgrade-button" onclick="showBulkActions()">Bulk Actions</button>
                    </div>
                    
                    <div class="recent-bookings">
                        <div class="booking-header">
                            <div>Team Members</div>
                            <div>Total: ${staff.length}</div>
                        </div>
                `;
                
                staff.forEach(member => {
                    const statusClass = member.status === 'active' ? 'status-confirmed' : 'status-pending';
                    const statusText = member.status === 'active' ? 'Active' : 'Inactive';
                    
                    html += `
                        <div class="booking-item">
                            <div class="booking-info">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <div style="flex: 1;">
                                        <div class="booking-customer">${member.name}</div>
                                        <div class="booking-service">${member.email || 'No email'}</div>
                                        <div class="booking-time">${member.phone || 'No phone'}</div>
                                    </div>
                                    <div style="text-align: right;">
                                        <span class="booking-status ${statusClass}">${statusText}</span>
                                        <div style="margin-top: 10px;">
                                            <button onclick="viewStaffPerformance('${member.id}')" style="background: #2563eb; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer;">📊 Performance</button>
                                            <button onclick="editStaffMember('${member.id}')" style="background: #10b981; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px;">✏️ Edit</button>
                                            <button onclick="deleteStaffMember('${member.id}', '${member.name}')" style="background: #ef4444; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px;">🗑️ Delete</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Staff load error:', error);
                showError('Failed to load staff.');
            }

        // Helper functions for settlement calculation
        function calculateSettlementDate(startDate) {
            const date = new Date(startDate);
            let businessDaysToAdd = 3; // Average settlement time
            
            while (businessDaysToAdd > 0) {
                date.setDate(date.getDate() + 1);
                const day = date.getDay();
                if (day >= 1 && day <= 5) { // Monday-Friday
                    businessDaysToAdd--;
                }
            }
            
            return date;
        }
        
        function getNextBusinessDay(date) {
            const nextDay = new Date(date);
            nextDay.setDate(nextDay.getDate() + 1);
            
            const day = nextDay.getDay();
            if (day === 0) { // Sunday
                nextDay.setDate(nextDay.getDate() + 1); // Move to Monday
            } else if (day === 6) { // Saturday
                nextDay.setDate(nextDay.getDate() + 2); // Move to Monday
            }
            
            return nextDay;
        }

                                    <div class="transaction-detail">
                                        <span class="transaction-label">Net</span>
                                        <span class="transaction-value positive">£${transaction.net_amount.toFixed(2)}</span>
                                    </div>
                                    <div class="transaction-detail">
                                        <span class="transaction-label">Settlement</span>
                                        <span class="transaction-value" style="color: #f59e0b;">${settlementDate.toLocaleDateString()}</span>
                                    </div>
                                    <div class="transaction-detail">
                                        <span class="transaction-label">Payout</span>
                                        <span class="transaction-value" style="color: #10b981;">${payoutDate.toLocaleDateString()}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                            return html;
                        }).join('');
                    } else {
                        transactionsList.innerHTML = '<div style="text-align: center; padding: 20px; color: #6b7280; font-size: 14px;">No transactions found for this period</div>';
                    }
                }
            } catch (error) {
                console.error('Error loading earnings:', error);
                showNotification('Failed to load earnings data', 'error');
            }
        }
    </script>
</body>
</html>
