<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Show Up Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .success-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin: 20px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: white;
        }
        
        .success-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        
        .success-message {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 32px;
        }
        
        .booking-details {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
            text-align: left;
        }
        
        .booking-details h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-weight: 500;
            color: #6c757d;
        }
        
        .detail-value {
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: #2563eb;
            border: 2px solid #2563eb;
        }
        
        .btn-secondary:hover {
            background: #2563eb;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div id="loadingContent" class="loading">
            <div class="spinner"></div>
            <p>Confirming your booking...</p>
        </div>
        
        <div id="successContent" style="display: none;">
            <div class="success-icon">?</div>
            <h1 class="success-title">Payment Successful!</h1>
            <p class="success-message">Your booking has been confirmed. We've sent a confirmation email to you.</p>
            
            <div id="bookingDetails" class="booking-details">
                <!-- Booking details will be loaded here -->
            </div>
            
            <div class="action-buttons">
                <a href="#" id="backToBooking" class="btn btn-secondary">? Back to Booking Page</a>
                <a href="#" class="btn btn-primary">Add to Calendar</a>
            </div>
        </div>
        
        <div id="errorContent" style="display: none;">
            <div class="error">
                <strong>Booking Confirmation Failed</strong>
                <p>We couldn't confirm your booking. Please contact support.</p>
            </div>
            <a href="#" id="retryBooking" class="btn btn-primary">Try Again</a>
        </div>
    </div>

    <script>
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        async function confirmBooking() {
            if (!sessionId) {
                showError();
                return;
            }
            
            try {
                const response = await fetch(`/.netlify/functions/payment-success?session_id=${sessionId}`);
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(result.booking);
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Confirmation error:', error);
                showError();
            }
        }
        
        function showSuccess(booking) {
            document.getElementById('loadingContent').style.display = 'none';
            document.getElementById('successContent').style.display = 'block';
            
            // Update booking details
            const detailsHtml = `
                <h3>Booking Details</h3>
                <div class="detail-row">
                    <span class="detail-label">Service</span>
                    <span class="detail-value">${booking.services.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date</span>
                    <span class="detail-value">${new Date(booking.booking_date).toLocaleDateString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Time</span>
                    <span class="detail-value">${booking.booking_time}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Customer</span>
                    <span class="detail-value">${booking.customer_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Business</span>
                    <span class="detail-value">${booking.businesses.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Price Paid</span>
                    <span class="detail-value">£${booking.services.price}</span>
                </div>
            `;
            
            document.getElementById('bookingDetails').innerHTML = detailsHtml;
            
            // Update back button
            document.getElementById('backToBooking').href = `/booking/${booking.businesses.subdomain}`;
        }
        
        function showError() {
            document.getElementById('loadingContent').style.display = 'none';
            document.getElementById('errorContent').style.display = 'block';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', confirmBooking);
    </script>
</body>
</html>
